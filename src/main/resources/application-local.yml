spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hot_deal}
    username: ${DB_USERNAME:hotdeal}
    password: ${DB_PASSWORD:hotdeal}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          scheduler:
            instanceName: hotDealSchedulerLocal
            instanceId: AUTO
          threadPool:
            threadCount: 5

app:
  security:
    admin:
      username: ${APP_ADMIN_USERNAME:admin}
      password: ${APP_ADMIN_PASSWORD:admin123}
    service:
      username: ${APP_SERVICE_USERNAME:service}
      password: ${APP_SERVICE_PASSWORD:service123}
